AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Contact form API for joshblair.bonefishsoftware.com.
  HTTP API + Python Lambda + DynamoDB + SES.
  Deploy to us-west-2.

Parameters:
  FromAddress:
    Type: String
    Default: noreply@bonefishsoftware.com
    Description: SES-verified sender address.

  ToAddress:
    Type: String
    Default: josh.blair@gmail.com
    Description: Recipient address for contact form submissions.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 15
    MemorySize: 128
    Environment:
      Variables:
        TABLE_NAME: !Ref SubmissionsTable
        FROM_ADDRESS: !Ref FromAddress
        TO_ADDRESS: !Ref ToAddress

Resources:

  SubmissionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: joshblair-contact-submissions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: submissionId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: submissionId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: joshblair-bonefishsoftware-com

  ContactApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - https://joshblair.bonefishsoftware.com
          - http://localhost:5174
          - http://localhost:5175
        AllowHeaders:
          - Content-Type
        AllowMethods:
          - POST
          - OPTIONS
        MaxAge: 300

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: joshblair-contact-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: JoshBlairContactLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DynamoDB
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt SubmissionsTable.Arn
              - Sid: SES
                Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: '*'

  ContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: joshblair-contact-handler
      CodeUri: ../../lambda/joshblair-contact/
      Handler: handler.handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        PostContact:
          Type: HttpApi
          Properties:
            ApiId: !Ref ContactApi
            Path: /contact
            Method: POST
        OptionsContact:
          Type: HttpApi
          Properties:
            ApiId: !Ref ContactApi
            Path: /contact
            Method: OPTIONS

Outputs:
  ApiUrl:
    Description: Contact form endpoint — set as VITE_CONTACT_API_URL in the joshblair CodeBuild project
    Value: !Sub 'https://${ContactApi}.execute-api.${AWS::Region}.amazonaws.com/contact'

  TableName:
    Description: DynamoDB table for joshblair contact submissions
    Value: !Ref SubmissionsTable
