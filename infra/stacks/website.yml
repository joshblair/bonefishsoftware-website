AWSTemplateFormatVersion: '2010-09-09'
Description: >
  S3 origin bucket + CloudFront distribution for bonefishsoftware.com.
  Deploy to us-west-2.
  CertificateArn is optional — omit it on first deploy to get the CloudFront URL
  immediately. Once the ACM cert is issued, redeploy with CertificateArn and
  DomainName to switch on the custom domain.

Parameters:
  DomainName:
    Type: String
    Default: ''
    Description: >
      Leave blank on first deploy. Set to bonefishsoftware.com once the ACM
      certificate is issued and your nameservers point to Route 53.

  CertificateArn:
    Type: String
    Default: ''
    Description: >
      Leave blank on first deploy. Set to the ACM cert ARN (from us-east-1)
      once the certificate has been issued.

Conditions:
  HasCustomDomain: !And
    - !Not [!Equals [!Ref CertificateArn, '']]
    - !Not [!Equals [!Ref DomainName, '']]

Resources:

  # --- S3 Bucket (private — served only through CloudFront OAC) ---
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: bonefishsoftware-com-website
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: bonefishsoftware-com

  # --- CloudFront Origin Access Control ---
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: bonefishsoftware-com-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- S3 Bucket Policy: allow CloudFront OAC only ---
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub >-
                  arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}

  # --- CloudFront Distribution ---
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: bonefishsoftware.com static site
        DefaultRootObject: index.html
        Aliases: !If
          - HasCustomDomain
          - - !Ref DomainName
            - !Sub 'www.${DomainName}'
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        HttpVersion: http2and3
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
          AllowedMethods: [GET, HEAD, OPTIONS]
        # SPA routing: S3 returns 403 for missing keys with OAC — map both to index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        PriceClass: PriceClass_100
      Tags:
        - Key: Project
          Value: bonefishsoftware-com

Outputs:
  BucketName:
    Description: S3 bucket that holds the static site
    Value: !Ref WebsiteBucket
    Export:
      Name: BonefishWebsiteBucket

  DistributionId:
    Description: CloudFront distribution ID (used by CodeBuild for invalidations)
    Value: !Ref Distribution
    Export:
      Name: BonefishDistributionId

  DistributionDomain:
    Description: CloudFront URL — site is live here immediately
    Value: !Sub 'https://${Distribution.DomainName}'
